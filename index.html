<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>WebRTC Video Chat Example</title>
</head>
<body>
	<h1>WebRTC Video Chat Example</h1>
	<video id="localVideo" autoplay></video>
	<video id="remoteVideo" autoplay></video>
	<br>
	<button id="startButton">Start Call</button>
	<button id="hangupButton">Hang Up</button>
	<script>


const startButton = document.getElementById('startButton');
const hangupButton = document.getElementById('hangupButton');
let localStream;
let remoteStream;
let peerConnection;

startButton.disabled = false;
hangupButton.disabled = true;

startButton.onclick = start;
hangupButton.onclick = hangup;

function start() {
	navigator.mediaDevices.getUserMedia({ audio: true, video: true })
		.then(stream => {
			localStream = stream;
			document.getElementById('localVideo').srcObject = localStream;
			return navigator.mediaDevices.getUserMedia({ audio: true, video: true });
		})
		.then(stream => {
			remoteStream = stream;
			document.getElementById('remoteVideo').srcObject = remoteStream;

			const configuration = {
				iceServers: [
					{ urls: 'stun:stun.l.google.com:19302' },
					{ urls: 'stun:stun1.l.google.com:19302' }
				]
			};

			peerConnection = new RTCPeerConnection(configuration);

			localStream.getTracks().forEach(track => {
				peerConnection.addTrack(track, localStream);
			});

			peerConnection.ontrack = event => {
				event.streams[0].getTracks().forEach(track => {
					remoteStream.addTrack(track);
				});
			};

			peerConnection.onicecandidate = event => {
				if (event.candidate) {
					sendMessage(JSON.stringify({ type: 'candidate', candidate: event.candidate }));
				}
			};

			peerConnection.createOffer()
				.then(offer => peerConnection.setLocalDescription(offer))
				.then(() => {
					sendMessage(JSON.stringify({ type: 'offer', sdp: peerConnection.localDescription }));
				});
		})
		.catch(error => console.log(error));

	startButton.disabled = true;
	hangupButton.disabled = false;
}

function hangup() {
	peerConnection.close();
	peerConnection = null;
	localStream.getTracks().forEach(track => track.stop());
	localStream = null;
	remoteStream.getTracks().forEach(track => track.stop());
	remoteStream = null;
	document.getElementById('localVideo').srcObject = null;
	document.getElementById('remoteVideo').srcObject = null;

	startButton.disabled = false;
	hangupButton.disabled = true;
}

function sendMessage(message) {
	// Send message to signaling server here
	console.log(`Sent message: ${message}`);
}

  </script>
</body>
</html>
